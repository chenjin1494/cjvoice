# Build & Release: 统一 Android + Windows 构建并发布 Release
# push 到 main/master 时构建两平台产物 → 发布到 GitHub Releases
# PR 只构建验证，不发布
# 基于 gh CLI 实现 Releases 管理

name: Build & Release

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'server/**'
      - 'client/**'
      - '.github/workflows/build-n-release.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'client/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────
  # Android APK
  # ──────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - run: gradle wrapper --gradle-version 8.5

      - run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: server/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

  # ──────────────────────────────────────
  # Windows exe
  # ──────────────────────────────────────
  windows:
    name: Windows exe
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client/WpfClient
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore

      - run: dotnet build -c Release --no-restore

      - run: |
          dotnet publish -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugSymbols=false -p:DebugType=none `
            -o publish

      - uses: actions/upload-artifact@v4
        with:
          name: client
          path: client/WpfClient/publish/
          retention-days: 7
          if-no-files-found: error

  # ──────────────────────────────────────
  # Release（仅 push to main/master）
  # ──────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [android, windows]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Package artifacts
        run: |
          VERSION=$(date +'%Y%m%d_%H%M')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cp apk/app-debug.apk "CJVoice-Android-v${VERSION}.apk"
          rm -f client/*.pdb
          cd client && zip -r "../CJVoice-Windows-v${VERSION}.zip" . && cd ..
        shell: bash

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"
          gh release create "$TAG" \
            --title "CJ Voice $TAG" \
            --notes "CJ Voice $TAG

          ## 包含文件

          - \`CJVoice-Android-${TAG}.apk\` — Android 端 APK
          - \`CJVoice-Windows-${TAG}.zip\` — Windows 端单文件 exe

          使用方法请参见 README.md。" \
            --repo ${{ github.repository }}

      - name: Upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${VERSION}" "CJVoice-Android-v${VERSION}.apk" --repo ${{ github.repository }}

      - name: Upload Windows zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${VERSION}" "CJVoice-Windows-v${VERSION}.zip" --repo ${{ github.repository }}
