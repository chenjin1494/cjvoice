# GitHub Actions: 构建 Windows 客户端 (WPF .NET)
# 使用 windows-latest runner，dotnet publish 输出单文件 exe
name: Build Windows Client

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'client/**'
      - '.github/workflows/windows-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'client/**'
  workflow_dispatch:  # 手动触发

jobs:
  build:
    name: Build WPF Client
    runs-on: windows-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: client/WpfClient

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Publish standalone executable
        run: |
          dotnet publish -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CJVoiceClient-win-x64
          path: client/WpfClient/publish/
          retention-days: 30
          if-no-files-found: error
